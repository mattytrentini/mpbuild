# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files

- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version. Keep in sync with the ruff entry in pyproject.toml's dev group.
  rev: v0.15.12
  hooks:
    # Run the linter.
    - id: ruff-check
      args: [ --fix ]
    # Run the formatter.
    - id: ruff-format

# ty (Astral type checker) is invoked via the local uv environment because
# astral-sh/ty-pre-commit does not yet exist. Switch to the upstream hook
# repo when it ships.
- repo: local
  hooks:
    - id: ty
      name: ty
      entry: uv run ty check
      language: system
      pass_filenames: false
      types: [python]
